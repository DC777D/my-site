<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Наша дружба 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
    :root {
        --accent: #74b9ff;
    }

    body {
        margin: 0;
        padding: 0;
        font-family: 'Playfair Display', serif;
        overflow: hidden;
        height: 100vh;
        background: linear-gradient(-45deg, #74b9ff, #a29bfe, #81ecec, #ffeaa7);
        background-size: 400% 400%;
        animation: bg 15s ease infinite;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    @keyframes bg {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .container {
        text-align: center;
        width: 90%;
        max-width: 520px;
        z-index: 10;
    }

    /* Поляроид */
    .polaroid {
        background: white;
        padding: 18px 18px 55px;
        border-radius: 12px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.35);
        transform: rotate(-3deg);
        transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .polaroid:hover {
        transform: rotate(1deg) scale(1.04);
    }

    .polaroid img {
        width: 100%;
        height: 62vh;
        object-fit: cover;
        border-radius: 6px;
        opacity: 0;
        transform: scale(1.08);
        transition: all 0.9s ease;
        box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    .polaroid img.show {
        opacity: 1;
        transform: scale(1);
    }

    .caption {
        margin-top: 18px;
        font-size: 19px;
        color: #2d3436;
        font-style: italic;
        min-height: 1.4em;
    }

    button {
        margin-top: 25px;
        padding: 15px 35px;
        border: none;
        background: white;
        color: #2d3436;
        font-size: 18px;
        font-family: 'Playfair Display', serif;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        transition: all 0.3s;
    }

    button:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 25px rgba(116, 185, 255, 0.4);
    }

    /* Разлетающиеся фото */
    .floating-img {
        position: fixed;
        width: 110px;
        height: 110px;
        object-fit: cover;
        border-radius: 12px;
        border: 5px solid white;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        z-index: 5;
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2) rotate(0deg);
        animation: fly 2.2s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }

    @keyframes fly {
        to {
            opacity: 1;
            transform: translate(var(--x), var(--y)) scale(1) rotate(var(--rot));
        }
    }

    /* Письмо */
    .letter {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgba(0,0,0,0.4);
        opacity: 0;
        pointer-events: none;
        transition: opacity 1.2s ease;
        z-index: 100;
    }

    .letter.active {
        opacity: 1;
        pointer-events: all;
    }

    .letter-box {
        background: white;
        padding: 40px 35px;
        border-radius: 24px;
        max-width: 340px;
        text-align: center;
        box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        transform: scale(0.6) translateY(40px);
        opacity: 0;
        transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .letter.active .letter-box {
        transform: scale(1) translateY(0);
        opacity: 1;
    }

    .letter-box h2 {
        font-family: 'Great Vibes', cursive;
        font-size: 52px;
        color: var(--accent);
        margin: 0 0 15px 0;
    }

    .heart {
        font-size: 28px;
        animation: heartbeat 1.5s infinite;
    }

    @keyframes heartbeat {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.25); }
    }
</style>
</head>

<body>

<div class="container" id="main">
    <div class="polaroid">
        <img id="photo" src="1.jpg">
        <div class="caption" id="quote"></div>
    </div>
    <button onclick="next()">Дальше 💙</button>
</div>

<!-- Письмо -->
<div class="letter" id="letter">
    <div class="letter-box">
        <h2>💌</h2>
        <p style="font-size: 18px; line-height: 1.6; color: #2d3436;">
            Жду тебя очень сильно в Кропивницком 💙<br><br>
            <span class="heart">♥</span>
        </p>
    </div>
</div>

<script>
const photos = ["1.jpg","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg","7.jpg"];

const quotes = [
    "Ты невероятно красивая 💙",
    "Ты очень милая и нежная 😊",
    "С тобой всегда легко и тепло",
    "У тебя особенная, светлая энергия ✨",
    "Ты просто классная",
    "Ты делаешь мои дни намного лучше",
    "Ты правда очень-очень особенная 💫"
];

let index = 0;

function show() {
    const img = document.getElementById("photo");
    const text = document.getElementById("quote");

    img.classList.remove("show");

    setTimeout(() => {
        img.src = photos[index];
        text.textContent = quotes[index];
        img.classList.add("show");
    }, 350);
}

function next() {
    index++;

    if (index >= photos.length) {
        finalScene();
        return;
    }

    show();
}

function finalScene() {
    const main = document.getElementById("main");
    main.style.transition = "opacity 0.8s";
    main.style.opacity = "0";

    setTimeout(() => {
        main.style.display = "none";

        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        const radius = Math.min(window.innerWidth, window.innerHeight) * 0.38;

        photos.forEach((photo, i) => {
            const img = document.createElement("img");
            img.src = photo;
            img.className = "floating-img";

            // начальная позиция — центр
            img.style.left = centerX + "px";
            img.style.top = centerY + "px";

            const angle = (i / photos.length) * Math.PI * 2 + (Math.random() * 0.4 - 0.2);
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius * 0.85; // чуть сплющиваем круг

            img.style.setProperty("--x", (x) + "px");
            img.style.setProperty("--y", (y) + "px");
            img.style.setProperty("--rot", (Math.random() * 40 - 20) + "deg");

            // небольшая задержка для красивого старта
            img.style.animationDelay = (i * 80) + "ms";

            document.body.appendChild(img);
        });

        // Показываем письмо
        setTimeout(() => {
            document.getElementById("letter").classList.add("active");
        }, 1600);

    }, 700);
}

// Запуск первой фотографии
show();
</script>

</body>
</html>
